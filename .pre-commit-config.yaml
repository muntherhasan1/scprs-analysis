# Local guardrails — run before every commit. Install once with:
#   pip install pre-commit && pre-commit install
# Run manually against all files with: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key        # blocks committed private keys
      - id: check-added-large-files   # blocks accidental data dumps
        args: ["--maxkb=5000"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff                      # lint
      - id: ruff-format               # format

  # Local hooks run through the installed (signed) Python interpreter via
  # `python -m`, rather than the unsigned .exe shims pre-commit generates in an
  # isolated environment — on Windows, Smart App Control / WDAC blocks those
  # shims (WinError 4551). Both tools ship in requirements-dev.txt.
  #
  # detect-secrets replaces the gitleaks pre-commit hook here: gitleaks is a Go
  # binary with no `python -m` form, so its unsigned exe was permanently WDAC-
  # blocked. CI runs the same detect-secrets scan against .secrets.baseline, so
  # local and CI agree; GitHub's native secret scanning + push protection sit in
  # front of both. Manage false positives in .secrets.baseline (see README).
  - repo: local
    hooks:
      - id: detect-secrets
        name: detect-secrets
        entry: python -m detect_secrets.pre_commit_hook --baseline .secrets.baseline
        language: system
        exclude: ^\.secrets\.baseline$
      - id: bandit
        name: bandit (SAST)
        entry: python -m bandit -c pyproject.toml
        language: system
        types: [python]
        exclude: ^tests/
