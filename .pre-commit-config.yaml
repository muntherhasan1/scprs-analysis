# Local guardrails — run before every commit. Install once with:
#   pip install pre-commit && pre-commit install
# Run manually against all files with: pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff                      # lint
      - id: ruff-format               # format

  # Local hooks run through the installed (signed) Python interpreter via
  # `python -m`, rather than the unsigned .exe shims pre-commit generates in an
  # isolated environment — on Windows, Smart App Control / WDAC blocks those
  # shims (WinError 4551). Both tools ship in requirements-dev.txt.
  #
  # detect-secrets replaces the gitleaks pre-commit hook here: gitleaks is a Go
  # binary with no `python -m` form, so its unsigned exe was permanently WDAC-
  # blocked. CI runs the same detect-secrets scan against .secrets.baseline, so
  # local and CI agree; GitHub's native secret scanning + push protection sit in
  # front of both. Manage false positives in .secrets.baseline (see README).
  # The standard pre-commit-hooks suite also runs as local `python -m` hooks
  # (the `pre-commit-hooks` package in requirements-dev.txt): the isolated-env
  # shims for end-of-file-fixer / check-merge-conflict became persistently
  # WDAC-blocked on 2026-07-23, joining gitleaks. Same ids, same behavior.
  - repo: local
    hooks:
      - id: detect-private-key
        name: detect private key
        entry: python -m pre_commit_hooks.detect_private_key
        language: system
        types: [text]
      - id: check-added-large-files
        name: check for added large files
        entry: python -m pre_commit_hooks.check_added_large_files --maxkb=5000
        language: system
      - id: end-of-file-fixer
        name: fix end of files
        entry: python -m pre_commit_hooks.end_of_file_fixer
        language: system
        types: [text]
      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: python -m pre_commit_hooks.trailing_whitespace_fixer
        language: system
        types: [text]
      - id: check-merge-conflict
        name: check for merge conflicts
        entry: python -m pre_commit_hooks.check_merge_conflict
        language: system
        types: [text]
      - id: detect-secrets
        name: detect-secrets
        entry: python -m detect_secrets.pre_commit_hook --baseline .secrets.baseline
        language: system
        exclude: ^\.secrets\.baseline$
      - id: bandit
        name: bandit (SAST)
        entry: python -m bandit -c pyproject.toml
        language: system
        types: [python]
        exclude: ^tests/
