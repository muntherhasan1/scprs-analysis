name: Enrich (Wave 2)

# Wave 2b+2c: scheduled cloud enrichment and warehouse refresh (plus the original
# manual canary mode). Each run does the fetch -> enrich -> integrity-gate ->
# publish round-trip on scprs.db (proven end-to-end on 2026-07-20, run
# 29763141085), then rebuilds the warehouse, publishes the serve DB, and
# best-effort restarts the Spaces — the fully device-free loop.
#
# Scheduled runs pick the business unit MOST IN NEED automatically
# (`health --next-bu`: never-enriched first, then least-recently-advanced), so
# staleness is self-curing — the pick rotates as units advance. Manual dispatches
# still accept explicit inputs and default to a small 8660 canary slice.
on:
  schedule:
    # Every 6 hours, offset from the top of the hour. 4 runs/day x limit 50
    # ≈ 200 day-slices/day, matching the manual enrichment-pass cadence.
    - cron: "17 2,8,14,20 * * *"
  workflow_dispatch:
    inputs:
      business_unit:
        description: Business unit to enrich (blank = auto-pick the most-stale unit)
        default: "8660"
      limit:
        description: Max days to process this run (keep small for a canary)
        default: "3"
      from_date:
        description: Window start (MM/DD/YYYY) — bounds eligible summarized days
        default: "07/01/2016"
      to_date:
        description: Window end (MM/DD/YYYY)
        default: "06/30/2028"
      budget_minutes:
        description: Enrich wall-clock budget in minutes (must stay under timeout-minutes)
        default: "70"

permissions:
  contents: read

# Single-writer guarantee: only one run may mutate scprs.db at a time. Do NOT
# cancel an in-progress run — a writer interrupted mid-upload could corrupt the
# dataset; queue instead. Sub-phase 2b's scheduled workflow shares this group.
concurrency:
  group: scprs-operational-writer
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    # Backstop only — enrich self-budgets (--budget-minutes 70) and exits
    # cleanly with whatever it completed, leaving ~20 min for the warehouse
    # rebuild + publish steps. This timeout should never fire unless the
    # browser truly wedges; when it does, the run concludes `cancelled`, which
    # the triage workflow treats like a failure (the 2026-07-20..23 livelock —
    # 12 straight timeout kills on BU 3540 with zero alert — must stay loud).
    # HF dataset commits are atomic, so a kill can't half-publish scprs.db.
    timeout-minutes: 90
    env:
      # Unbuffered stdout: a killed run must still show how far it got — the
      # livelock above was invisible partly because Python's block-buffered
      # output died with the process, showing 90 silent minutes.
      PYTHONUNBUFFERED: "1"
      # The operational store's private dataset. Override with a repo variable if needed.
      SCPRS_DATASET: ${{ vars.SCPRS_DATASET || 'munther-hasan/scprs-operational-db' }}
      # Dedicated read+write token for that dataset (Actions secret). CI is the sole writer.
      HF_SCPRS_TOKEN: ${{ secrets.HF_SCPRS_TOKEN }}
      # Chromium runs unprivileged on the runner — match the container launch flags.
      PLAYWRIGHT_NO_SANDBOX: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt "huggingface_hub>=0.25"
          playwright install --with-deps chromium

      - name: Fetch scprs.db from the dataset
        run: python -m src.data_sync fetch-operational

      # On a schedule event all `inputs.*` are empty: pick the unit most in need
      # and a larger slice. A manual dispatch with a blank business_unit also
      # auto-picks. `--next-bu` exit codes: 0 = picked, 1 = nothing pending
      # (fall back to 8660, where enrich no-ops harmlessly), >=2 = the picker
      # CRASHED (corrupt store, missing table) — fail loudly instead of
      # silently enriching the wrong unit. Inputs pass through `env`, never
      # inline `${{ }}` in bash (quote-injection hygiene).
      - name: Resolve run parameters
        id: params
        env:
          IN_BU: ${{ inputs.business_unit }}
          IN_LIMIT: ${{ inputs.limit }}
          IN_FROM: ${{ inputs.from_date }}
          IN_TO: ${{ inputs.to_date }}
          IN_BUDGET: ${{ inputs.budget_minutes }}
        run: |
          bu="$IN_BU"
          if [ -z "$bu" ]; then
            set +e
            bu=$(python -m src.health --next-bu)
            rc=$?
            set -e
            if [ "$rc" -ge 2 ]; then
              echo "::error::health --next-bu crashed (exit $rc) — refusing to guess a unit"
              exit 1
            fi
            bu=${bu:-8660}
            echo "auto-picked business unit: $bu"
          fi
          echo "bu=$bu" >> "$GITHUB_OUTPUT"
          echo "limit=${IN_LIMIT:-50}" >> "$GITHUB_OUTPUT"
          echo "from=${IN_FROM:-07/01/2016}" >> "$GITHUB_OUTPUT"
          echo "to=${IN_TO:-06/30/2028}" >> "$GITHUB_OUTPUT"
          echo "budget=${IN_BUDGET:-70}" >> "$GITHUB_OUTPUT"

      # --budget-minutes makes big business units (3540 averages ~350 docs/day;
      # its largest days top 1,100) tractable: the run banks what it drilled and
      # exits 0 so the publish steps run; an unfinished day resumes doc-by-doc
      # next run instead of being re-scraped from scratch. The result line +
      # duration land in the run summary so budget erosion is a visible trend,
      # not a surprise timeout (the "~35 min worst case" lesson).
      - name: Enrich one slice (PO Details drill-down)
        env:
          BU: ${{ steps.params.outputs.bu }}
          FROM: ${{ steps.params.outputs.from }}
          TO: ${{ steps.params.outputs.to }}
          LIMIT: ${{ steps.params.outputs.limit }}
          BUDGET: ${{ steps.params.outputs.budget }}
        run: |
          set -o pipefail
          start=$SECONDS
          python -m src.model enrich "$BU" "$FROM" "$TO" \
            --limit "$LIMIT" --newest-first --budget-minutes "$BUDGET" \
            2>&1 | tee enrich.log
          {
            echo "### Enrich — BU $BU (limit $LIMIT, budget ${BUDGET}m)"
            echo '```'
            grep -F "days_total" enrich.log | tail -1
            echo "enrich step took $(( (SECONDS - start) / 60 ))m $(( (SECONDS - start) % 60 ))s"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Wave-1 gate. Only the *integrity* checks (contracts, canary) block the
      # publish — they detect a corrupt/partial store, and a blocked publish leaves
      # the day unrecorded so the next run safely retries. `health` is report-only
      # here: it contains freshness checks only, and failing the publish on
      # staleness would deadlock — the publish IS what advances freshness, so a
      # stale unit would block the very action that cures it.
      - name: Wave-1 checks (gate the publish)
        run: |
          set +e
          echo "::group::health"
          python -m src.health; H=$?
          echo "::endgroup::"
          echo "::group::contracts"
          python -m src.contracts capture
          python -m src.contracts check; C=$?
          echo "::endgroup::"
          echo "::group::canary (live parse-drift probe)"
          python -m src.canary; K=$?
          echo "::endgroup::"
          echo "results: health=$H contracts=$C canary=$K"
          fail=0
          if [ "$H" -ne 0 ]; then echo "::warning::health reported freshness error finding(s) — report-only, does not gate the publish"; fi
          if [ "$C" -ne 0 ]; then echo "::error::contracts reported a metric-delta violation"; fail=1; fi
          if [ "$K" -eq 1 ]; then echo "::error::canary detected parse drift — parser may be writing bad data"; fail=1; fi
          if [ "$K" -eq 2 ]; then echo "::warning::canary UNAVAILABLE (site unreachable) — not gating on this"; fi
          exit $fail

      # Only reached if every prior step succeeded (upload-on-success contract).
      - name: Publish scprs.db back to the dataset
        run: python -m src.data_sync publish-operational

      # ---- Wave 2c: refresh the served warehouse from the just-enriched store ----
      # scprs.db is already published above, so a failure below never loses
      # enrichment progress — it only leaves the Spaces serving the previous
      # serve-DB snapshot. `warehouse build` has its own error-severity DQ gate
      # (non-zero exit on failure), so a bad build never reaches the publish step.
      - name: Rebuild warehouse + export serve DB
        run: |
          python -m src.warehouse build
          python -m src.warehouse serve-export

      - name: Publish serve DB
        env:
          HF_WAREHOUSE_TOKEN: ${{ secrets.HF_WAREHOUSE_TOKEN }}
        run: >
          python -m src.data_sync publish
          --dataset "${{ vars.WAREHOUSE_DATASET || 'munther-hasan/scprs-warehouse-data' }}"

      # Best-effort go-live: restart the Spaces so they re-fetch the serve DB at
      # boot. Needs the optional HF_DEPLOY_TOKEN secret (write on both Space
      # repos); without it this prints FAILED per Space and exits 0 — the data is
      # published either way and goes live on the next manual reboot.
      - name: Restart Spaces (best-effort)
        env:
          HF_DEPLOY_TOKEN: ${{ secrets.HF_DEPLOY_TOKEN }}
        run: python -m src.data_sync restart-spaces

      # Observability extended to deploys (retrospective action #4): verify over
      # the real MCP channel that the rebooted Space serves the snapshot THIS run
      # published. A failure here means the data is safe but NOT live — the
      # silent-staleness failure mode of 2026-07-20, made loud. Skips (exit 0)
      # when the MCP_VERIFY_TOKEN secret is unset.
      - name: Verify go-live (Space serves this build)
        id: golive
        env:
          MCP_VERIFY_TOKEN: ${{ secrets.MCP_VERIFY_TOKEN }}
        run: python -m src.golive_check

      # The one alarm outside GitHub (#44): a healthy end-to-end run pings the
      # dead-man's switch; the external service pages when pings stop, whatever
      # the cause — including "GitHub disabled every cron in this repo". The
      # pipeline monitor pings the same URL on its clean passes. Skips quietly
      # until the HEALTHCHECK_PING_URL secret is configured.
      - name: Dead-man's switch ping
        if: success()
        env:
          PING: ${{ secrets.HEALTHCHECK_PING_URL }}
        run: |
          if [ -n "$PING" ]; then
            curl -fsS -m 10 --retry 3 "$PING" >/dev/null \
              && echo "pinged dead-man's switch" \
              || echo "ping failed (non-fatal — the check's grace period absorbs one miss)"
          else
            echo "HEALTHCHECK_PING_URL not set — external dead-man's switch inactive (see #44)"
          fi

      # Wave 3 auto-rollback: if go-live verification failed, the just-published
      # serve DB is not serving cleanly — revert the serve dataset to its prior
      # (last-good) revision and restart, so the Spaces fall back to known-good
      # data instead of being stuck on a bad snapshot. Scoped to the go-live
      # step's failure only (a build/publish failure earlier published nothing to
      # roll back). The job still fails so the bad deploy is loudly visible.
      - name: Roll back serve DB on failed go-live
        if: ${{ always() && steps.golive.outcome == 'failure' }}
        env:
          HF_WAREHOUSE_TOKEN: ${{ secrets.HF_WAREHOUSE_TOKEN }}
          HF_DEPLOY_TOKEN: ${{ secrets.HF_DEPLOY_TOKEN }}
        run: >
          python -m src.data_sync rollback-serve
          --dataset "${{ vars.WAREHOUSE_DATASET || 'munther-hasan/scprs-warehouse-data' }}"
