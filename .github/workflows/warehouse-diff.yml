name: Warehouse diff

# Wave 3 (continuous delivery): on a PR that touches warehouse-shaping code, build
# the warehouse from the SAME real operational data on both the PR code and the
# base code, and post how gold OUTPUT changed (objects, mart columns, row counts,
# headline metrics). Informational, never a gate — warehouse output changes are
# often intended; this just surfaces the data impact for the reviewer.
on:
  pull_request:
    paths:
      - "src/warehouse.py"
      - "src/warehouse_diff.py"
      - "src/supplier_master.py"
      - "src/model.py"
      - "references/*.csv"

permissions:
  contents: read
  pull-requests: write # to post the diff as a PR comment

concurrency:
  group: warehouse-diff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diff:
    runs-on: ubuntu-latest
    # TWO full warehouse builds; measured 14m45s on 2026-07-23 (PR #42) and
    # growing ~6h-ly with enrichment — 45 min keeps headroom ahead of growth.
    timeout-minutes: 45
    env:
      PYTHONUNBUFFERED: "1" # a killed run must still show how far it got
      SCPRS_DATASET: ${{ vars.SCPRS_DATASET || 'munther-hasan/scprs-operational-db' }}
      # Least privilege (#54): this job only READS the dataset but executes
      # PR-head code, so it should never hold the single-writer token. Prefer a
      # fine-grained read-only HF_SCPRS_READ_TOKEN; the write token is only the
      # fallback until that secret is minted — remove the fallback once it is.
      HF_SCPRS_TOKEN: ${{ secrets.HF_SCPRS_READ_TOKEN || secrets.HF_SCPRS_TOKEN }}
    steps:
      - name: Checkout PR (head)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need base history to build the base code

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt "huggingface_hub>=0.25"

      # Real data (+ the CMAS / supplier side inputs) so the diff reflects true
      # output. Skip the whole job cleanly if the token/dataset isn't available.
      - name: Fetch operational data
        id: fetch
        run: |
          if [ -z "$HF_SCPRS_TOKEN" ]; then
            echo "no HF_SCPRS_TOKEN — skipping warehouse diff"
            echo "skip=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python -m src.data_sync fetch-operational

      - name: Build (head) + snapshot
        if: steps.fetch.outputs.skip != '1'
        run: |
          python -m src.warehouse build
          python -m src.warehouse_diff snapshot --db data/warehouse.db --out head.json

      # Swap ONLY the code to the base commit, rebuild against the same data, then
      # restore head so the (head) diff tool snapshots the base build. The base
      # build must start from a CLEAN warehouse.db: dw_document_history is
      # append-only (not dropped on rebuild), so reusing the head build's file
      # would cross-contaminate the history-derived marts and show a phantom diff.
      - name: Build (base) + snapshot
        if: steps.fetch.outputs.skip != '1'
        run: |
          rm -f data/warehouse.db
          git checkout ${{ github.event.pull_request.base.sha }} -- src references
          python -m src.warehouse build
          git checkout ${{ github.sha }} -- src references
          python -m src.warehouse_diff snapshot --db data/warehouse.db --out base.json

      - name: Render diff
        if: steps.fetch.outputs.skip != '1'
        run: |
          python -m src.warehouse_diff report --base base.json --head head.json \
            | tee diff.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment the diff on the PR
        if: steps.fetch.outputs.skip != '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('diff.md', 'utf8');
            const marker = '<!-- warehouse-diff -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const payload = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body: payload });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: payload });
            }
