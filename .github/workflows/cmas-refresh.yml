name: CMAS refresh (Wave 2)

# Device-free refresh of the CMAS side input. Extracts California's CMAS
# master-agreement data from its public Power BI embed (src/cmas.py — pure HTTP,
# no browser) and publishes cmas.db to the operational dataset, so the enrich
# workflow's warehouse build serves real CMAS supplier integration instead of
# empty marts. Upload-on-success: only a non-empty extract is published, so a
# blocked/failed run (e.g. cloud IPs refused) never overwrites good data.
on:
  schedule:
    # Daily — CMAS agreements change slowly. Offset from the enrich cron slots
    # (17 past 02/08/14/20) so the two rarely queue on the shared writer lock.
    - cron: "37 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

# Shares the operational-dataset single-writer group with the enrich workflow so
# two commits never race the same dataset repo. Queue, don't cancel.
concurrency:
  group: scprs-operational-writer
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # The operational store's private dataset (cmas.db lands alongside scprs.db).
      SCPRS_DATASET: ${{ vars.SCPRS_DATASET || 'munther-hasan/scprs-operational-db' }}
      # Read+write on that dataset (same Actions secret CI uses as the sole writer).
      HF_SCPRS_TOKEN: ${{ secrets.HF_SCPRS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # No Playwright browser needed — CMAS extraction is httpx/requests only.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt "huggingface_hub>=0.25"

      - name: Extract CMAS (Power BI embed -> data/cmas.db)
        run: python -m src.cmas extract

      # Upload-on-success gate: never publish an empty/partial extract over good data.
      - name: Sanity-check the extract
        run: |
          python - <<'PY'
          import sqlite3, sys
          n = sqlite3.connect("data/cmas.db").execute(
              "SELECT COUNT(*) FROM Approved_Applications").fetchone()[0]
          print(f"Approved_Applications rows: {n}")
          sys.exit(0 if n > 0 else 1)
          PY

      - name: Publish cmas.db to the operational dataset
        run: python -m src.data_sync publish-cmas
