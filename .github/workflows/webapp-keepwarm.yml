name: Web app keep-warm

# Pings the public NL web app Space (Gradio) on a schedule so it never idles to
# sleep, and so an outage is visible. On a failed ping it opens (or comments on)
# a tracked GitHub issue labeled `webapp-keepwarm-alert` and auto-closes it once a
# ping succeeds again. The Gradio root returns 200 with no auth. Mirrors
# mcp-keepwarm.yml (which covers the MCP Space).
on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (GitHub may delay under load)
  workflow_dispatch: # manual "wake it now" button

permissions:
  contents: read
  issues: write # open/close the alert issue

concurrency:
  group: webapp-keepwarm
  cancel-in-progress: true

env:
  URL: https://munther-hasan-scprs-warehouse-chat.hf.space/
  ALERT_LABEL: webapp-keepwarm-alert

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app
        id: ping
        run: |
          # Retry: if the Space was asleep, the first hit wakes it (slow), the
          # next confirms it's up. --max-time covers a cold start. We record the
          # result instead of exiting, so the alert/resolve steps always run.
          result=down
          codes=""
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 120 "$URL" || echo 000)
            echo "attempt $attempt: HTTP $code"
            codes="$codes $code"
            if [ "$code" = "200" ]; then result=up; break; fi
            sleep 15
          done
          echo "result=$result" >> "$GITHUB_OUTPUT"
          echo "codes=$codes" >> "$GITHUB_OUTPUT"

      - name: Ensure alert label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "$ALERT_LABEL" -c B60205 \
            -d "Web app Space keep-warm ping failure" 2>/dev/null || true

      - name: Alert on failure
        if: steps.ping.outputs.result == 'down'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CODES: ${{ steps.ping.outputs.codes }}
        run: |
          body="Keep-warm ping to \`$URL\` failed (HTTP codes:$CODES).

          The public NL web app Space may be asleep or down. Check the Space logs
          and its GEMINI_API_KEY / WAREHOUSE_DATASET config.

          Failing run: $RUN_URL"
          existing=$(gh issue list --label "$ALERT_LABEL" --state open \
            --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "Commenting on existing alert issue #$existing"
            gh issue comment "$existing" --body "$body"
          else
            echo "Opening new alert issue"
            gh issue create --title "🔴 Web app Space keep-warm ping failing" \
              --label "$ALERT_LABEL" --body "$body"
          fi

      - name: Resolve on recovery
        if: steps.ping.outputs.result == 'up'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Close any open alert issue — the Space is back up.
          for n in $(gh issue list --label "$ALERT_LABEL" --state open \
            --json number --jq '.[].number'); do
            echo "Resolving alert issue #$n"
            gh issue close "$n" \
              --comment "✅ Recovered — keep-warm ping returned 200. Run: $RUN_URL"
          done

      - name: Fail the run if the ping is down
        if: steps.ping.outputs.result == 'down'
        run: |
          echo "::error::Web app Space did not return 200 after 3 attempts"
          exit 1
