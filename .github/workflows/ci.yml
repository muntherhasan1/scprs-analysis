name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the whole workflow gets read-only by default.
# Grant more narrowly per-job only if a step needs it.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: SAST (bandit)
        run: bandit -c pyproject.toml -r src -q

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt

      # Same scanner + baseline as the local pre-commit hook, so CI and dev
      # agree. Layered behind GitHub's native secret scanning + push protection
      # (which block known-provider credentials before they ever land).
      - name: Secret scan (detect-secrets)
        run: |
          git ls-files -z -- ':!:.secrets.baseline' \
            | xargs -0 python -m detect_secrets.pre_commit_hook --baseline .secrets.baseline

      - name: Tests
        run: pytest -q
