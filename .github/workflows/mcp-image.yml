name: MCP image

# Builds and smoke-tests the remote MCP server container on Linux (where it
# actually runs), so the image is validated without needing Docker locally.
# Triggers only when the image or server changes.
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.mcp"
      - "Dockerfile.mcp.dockerignore"
      - "requirements-mcp.txt"
      - "src/mcp_server.py"
      - ".github/workflows/mcp-image.yml"
  pull_request:
    paths:
      - "Dockerfile.mcp"
      - "Dockerfile.mcp.dockerignore"
      - "requirements-mcp.txt"
      - "src/mcp_server.py"
      - ".github/workflows/mcp-image.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    # Build + 60s boot poll fit well inside 20 min; without this the default
    # is 360 min of held runner on a hang.
    timeout-minutes: 20
    env:
      DOCKER_BUILDKIT: "1"   # honor Dockerfile.mcp.dockerignore
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Stub warehouse.db (real data is git-ignored)
        run: |
          mkdir -p data
          python3 -c "import sqlite3; sqlite3.connect('data/warehouse.db').close()"

      - name: Build image
        run: docker build -f Dockerfile.mcp -t scprs-mcp .

      - name: Boot + auth smoke test
        run: |
          # The image bakes in no data: WAREHOUSE_DB is fetched at boot from the
          # private dataset, which CI has no token for. Mount the stub there
          # instead so the server boots and the auth gate is what's exercised.
          docker run -d --name mcp \
            -v "$PWD/data/warehouse.db:/data/warehouse.db:ro" \
            -e MCP_AUTH_TOKEN=ci-secret -p 8000:8000 scprs-mcp
          # Poll /healthz for up to 60s. A cold container imports matplotlib/numpy/
          # uvicorn and starts the MCP session manager before binding, which can take
          # >20s in CI — a tighter window made this smoke test flaky (identical images
          # passed on main and failed here). `|| true` keeps a not-yet-up curl (exit 7)
          # from aborting the step under `bash -e` before the logs are printed.
          health=000
          for _ in $(seq 1 60); do
            health=$(curl -s -o /dev/null -w '%{http_code}' localhost:8000/healthz || true)
            [ "$health" = "200" ] && break
            sleep 1
          done
          noauth=$(curl -s -o /dev/null -w '%{http_code}' -X POST localhost:8000/mcp || true)
          echo "healthz=$health  mcp(no token)=$noauth"
          # Always surface the container logs BEFORE asserting, so a genuine boot
          # failure shows its traceback instead of a bare 'exit 7'.
          docker logs mcp || true
          docker rm -f mcp >/dev/null 2>&1 || true
          test "$health" = "200"
          test "$noauth" = "401"
