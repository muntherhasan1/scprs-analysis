version: 2
updates:
  # Keep Python dependencies patched against known CVEs.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      python-deps:
        patterns: ["*"]
    # pandas was upgraded to 3.x by hand (2026-07): requirements.txt now floors at
    # >=3.0, so the earlier semver-major hold is removed and pandas updates flow
    # normally like every other dependency.

  # Keep GitHub Actions pinned to current, non-vulnerable versions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
