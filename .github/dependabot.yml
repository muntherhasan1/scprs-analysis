version: 2
updates:
  # Keep Python dependencies patched against known CVEs.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      python-deps:
        patterns: ["*"]
    # pandas major upgrades (e.g. 2.x -> 3.x) change data-parsing and aggregation
    # behavior in ways the unit tests may not catch, so they're done deliberately
    # by hand (build the warehouse + diff the gold marts). Remove this block when
    # performing that upgrade. Minor/patch pandas updates still flow normally.
    ignore:
      - dependency-name: "pandas"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions pinned to current, non-vulnerable versions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
