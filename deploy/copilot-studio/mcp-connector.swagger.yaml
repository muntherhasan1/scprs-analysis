# Power Platform / Copilot Studio custom connector for the SCPRS Warehouse MCP server.
#
# Copilot Studio speaks MCP only through a connector whose operation declares the
# agentic protocol via `x-ms-agentic-protocol`. Handing it a bare URL does NOT load
# the tools — import THIS definition instead.
#
# Import (one-time):
#   1. https://make.powerapps.com → (correct environment) → Custom connectors →
#      New custom connector → Import an OpenAPI file → upload this file.
#   2. Security tab: confirm API key, parameter name `Authorization`, location Header.
#   3. Create connector, then Test → New connection → paste the API key value as
#      exactly:  Bearer <MCP_AUTH_TOKEN>     (include the word "Bearer" and a space).
#   4. In Copilot Studio, add this connector to your agent as a tool; the six MCP
#      tools (list_marts, describe_table, data_dictionary, run_sql, generate_chart,
#      generate_report) then load.
#
# If your tenant is on the older SSE integration, change the protocol value to
# `mcp-sse` — but this server is Streamable HTTP, so `mcp-streamable-1.0` is correct.
swagger: '2.0'
info:
  title: SCPRS Warehouse MCP
  description: >-
    Read-only MCP server over the California SCPRS procurement warehouse. Tools for
    querying (run_sql), charting (generate_chart), and executive reports
    (generate_report). Public data; the server makes no LLM calls.
  version: 1.0.0
host: munther-hasan-scprs-warehouse-mcp.hf.space
basePath: /
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /mcp:
    post:
      summary: SCPRS Warehouse MCP server
      description: Streamable HTTP MCP endpoint (tools, resources, prompts).
      operationId: InvokeMCP
      x-ms-agentic-protocol: mcp-streamable-1.0
      responses:
        '200':
          description: Success
securityDefinitions:
  api_key:
    type: apiKey
    in: header
    name: Authorization
security:
  - api_key: []
